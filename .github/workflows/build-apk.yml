name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Automatic Version Bump
        id: bump
        run: |
          # Check head commit message for automated/skip tags to prevent loop
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if [[ "$COMMIT_MSG" == *"[skip ci]"* || "$COMMIT_MSG" == *"chore(release):"* ]]; then
            echo "Automated commit or manual skip detected. Skipping version bump."
            echo "skipped=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "Automated version bump started..."
          # Increment patch version in package.json
          npm version patch --no-git-tag-version
          
          # Read new version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "New Version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "skipped=false" >> $GITHUB_OUTPUT
          
          # Update android/app/build.gradle if it exists
          node -e '
            const fs = require("fs");
            const file = "android/app/build.gradle";
            if (fs.existsSync(file)) {
              let content = fs.readFileSync(file, "utf8");
              // Increment versionCode
              content = content.replace(/versionCode (\d+)/, (match, p1) => {
                const nextCode = parseInt(p1) + 1;
                console.log(`Bumping versionCode from ${p1} to ${nextCode}`);
                return `versionCode ${nextCode}`;
              });
              // Set versionName
              content = content.replace(/versionName "[^"]+"/, `versionName "${process.argv[1]}"`);
              fs.writeFileSync(file, content, "utf8");
              console.log("Successfully updated android build.gradle");
            } else {
              console.log("Android build.gradle not found, skipping android version sync");
            }
          ' "$NEW_VERSION"

      - name: Commit and Push Version Bump
        if: steps.bump.outputs.skipped == 'false' && steps.bump.outputs.new_version != ''
        run: |
          git add package.json
          if [ -f "package-lock.json" ]; then
            git add package-lock.json
          fi
          if [ -f "android/app/build.gradle" ]; then
            git add android/app/build.gradle
          fi
          git commit -m "chore(release): bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push origin HEAD:${{ github.ref }}

      - name: Install Web Dependencies
        run: npm ci || npm install

      - name: Generate App Icons
        run: |
          npm install -D @capacitor/assets
          npx @capacitor/assets generate --android

      - name: Build Web App
        run: npm run build:android

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: false

      # ---------------------------------------------------------------------------------------
      # SIGNING INSTRUCTIONS (Fallback & Local Keystore Generation)
      # ---------------------------------------------------------------------------------------
      # If you want GitHub to sign the APK, do the following on your local machine:
      #
      # 1. Generate Keystore (Terminal/Command Prompt):
      #    keytool -genkey -v -keystore release.keystore -alias my-alias -keyalg RSA -keysize 2048 -validity 10000
      # 
      # 2. Convert to Base64 String:
      #    Base64 encoding prevents whitespace and binary parsing issue in GitHub Secrets.
      #    Mac/Linux: base64 -w 0 release.keystore > release.keystore.base64
      #    Windows (PowerShell): [Convert]::ToBase64String([IO.File]::ReadAllBytes("release.keystore")) | Out-File -Encoding UTF8 release.keystore.base64
      #
      # 3. Add to GitHub Secrets (Settings > Secrets and variables > Actions > New repository secret):
      #    - SIGNING_KEY_STORE_BASE64 : [Paste the base64 text from step 2]
      #    - KEY_STORE_PASSWORD       : [The keystore password you chose]
      #    - ALIAS                    : [The alias you chose, e.g., my-alias]
      #    - KEY_PASSWORD             : [The key password you chose]
      # ---------------------------------------------------------------------------------------
      
      - name: Build and Sign Release APK
        working-directory: android
        run: |
          # Ensure gradlew has execution permissions
          chmod +x ./gradlew
          
          # Clean preliminary step
          ./gradlew clean
          
          # Check if signing keys are provided
          if [ -n "${{ secrets.SIGNING_KEY_STORE_BASE64 }}" ]; then
            echo "Signing properties found, preparing keystore..."
            echo "${{ secrets.SIGNING_KEY_STORE_BASE64 }}" | base64 --decode > keystore.jks
            
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=$(pwd)/keystore.jks \
              -Pandroid.injected.signing.store.password=${{ secrets.KEY_STORE_PASSWORD }} \
              -Pandroid.injected.signing.key.alias=${{ secrets.ALIAS }} \
              -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
          else
            echo "No signing secrets found. Building unsigned release APK..."
            ./gradlew assembleRelease
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/release/*.aab
          retention-days: 7
