<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#FDFBF7" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Habit Garden">
    <title>Habit Garden</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get: function() { return originalFetch; },
          set: function() { console.warn('Silently ignoring fetch override to prevent TypeError.'); },
          configurable: true,
          enumerable: true
        });
      } catch (e) {
        console.error('Failed to redefine window.fetch:', e);
      }
    </script>
    <link rel="manifest" href="/manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body, html {
        background-color: #FDFBF7;
        color: #1C1B1F;
        margin: 0;
      }
    </style>
    <script>
      window.addEventListener("error", function (e) {
          const el = document.createElement("div");
          el.style.cssText =
            "position:fixed;top:0;left:0;z-index:99999;background:rgba(255,0,0,0.9);color:white;padding:20px;width:100vw;height:100vh;overflow:auto;font-family:monospace;";
          el.innerHTML =
            "<h1>Global Error:</h1><b>" +
            (e.message || "Unknown Error") +
            "</b><br><br><pre>" +
            (e.error ? e.error.stack : "No stack") +
            "</pre>";
          document.body.appendChild(el);
      });
      window.addEventListener("unhandledrejection", function (e) {
        const err = e.reason;
        const el = document.createElement("div");
        el.style.cssText =
          "position:fixed;top:0;left:0;z-index:99999;background:rgba(255,165,0,0.9);color:white;padding:20px;width:100vw;height:100vh;overflow:auto;font-family:monospace;";
        el.innerHTML =
          "<h1>Unhandled Rejection:</h1><b>" +
          String(err) +
          "</b><br><br><pre>" +
          (err && err.stack ? err.stack : "No stack") +
          "</pre>";
        document.body.appendChild(el);
      });
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Splash Screen (replaced by React on mount) -->
      <div id="splash" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;text-align:center;">
        <div style="position:relative;width:14rem;height:14rem;margin-bottom:2rem;display:flex;align-items:center;justify-content:center;">
          <img src="/logo.svg" alt="App Logo" style="width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 4px 6px rgba(0,0,0,0.1));" />
        </div>
        <h1 style="font-size:1.875rem;font-weight:800;letter-spacing:-0.02em;margin:0;">Habit Garden</h1>
      </div>
      <style>
        @keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.15); } }
      </style>
    </div>
    <script type="module" src="/index.tsx"></script>
    <script>
      // Service worker disabled for dev
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
    </script>
  </body>
</html>
