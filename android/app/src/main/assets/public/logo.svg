<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arc path centered at top (24 degrees) -->
    <!-- R=220. Center 256,256 -->
    <path id="seg" d="M 210.26 40.82 A 220 220 0 0 1 301.74 40.82" fill="none" stroke-width="36" />
  </defs>

  <!-- Arcs -->
  <use href="#seg" transform="rotate(-90 256 256)" stroke="#6eba9f" />
  <use href="#seg" transform="rotate(-60 256 256)" stroke="#6eba9f" />
  <use href="#seg" transform="rotate(-30 256 256)" stroke="#fce473" />
  <use href="#seg" transform="rotate(0 256 256)" stroke="#6eba9f" />
  <use href="#seg" transform="rotate(30 256 256)" stroke="#6eba9f" />
  <use href="#seg" transform="rotate(60 256 256)" stroke="#6eba9f" />
  <use href="#seg" transform="rotate(90 256 256)" stroke="#6eba9f" />

  <!-- Green Mountains -->
  <path d="M 40 512 L 40 370 C 40 310, 80 260, 130 260 C 180 260, 210 330, 256 330 L 256 512 Z" fill="#6eba9f" stroke="#242220" stroke-width="12" stroke-linejoin="round" />
  <path d="M 472 512 L 472 370 C 472 310, 420 260, 380 260 C 330 260, 290 330, 256 330 L 256 512 Z" fill="#6eba9f" stroke="#242220" stroke-width="12" stroke-linejoin="round" />

  <!-- Red Mountain Main -->
  <!-- Left shoulder curve added -->
