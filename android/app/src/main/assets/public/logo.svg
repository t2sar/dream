  <!-- Path -->
  <path d="M 120 512 L 256 420 C 330 380, 350 350, 256 350 C 150 350, 150 280, 256 260 L 256 250" fill="none" stroke="#242220" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />

  <!-- ArrowHead -->
  <polygon points="256,225 230,265 282,265" fill="#242220" stroke="#242220" stroke-width="6" stroke-linejoin="round" />

  <!-- Dots -->
  <circle cx="256" cy="420" r="14" fill="#fce473" stroke="#242220" stroke-width="8" />
  <circle cx="256" cy="350" r="14" fill="#fce473" stroke="#242220" stroke-width="8" />

  <!-- Sprout at Peak -->
  <!-- Let's put standard leaves that match the user's flat design -->
